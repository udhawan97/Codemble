<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
<!-- Hallmark · pre-emit critique: P5 H5 E5 S5 R5 V4 -->
<title>Codemble animated mark</title>
<desc>An open lapis ensō fades into view, then three amber stars light and breathe softly.</desc>
<style>
  /* Hallmark · component: brand mark · genre: Edo star atlas · theme: Formal Edo
   * motion: transform + opacity only · reduced motion: static illuminated state
   */
  :root { --cm-ease: cubic-bezier(0.16, 0.7, 0.3, 1); }

  @keyframes cm-fadein {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes cm-haze {
    0%, 100% { opacity: 0.72; transform: scale(0.98); }
    50% { opacity: 1; transform: scale(1.02); }
  }

  @keyframes cm-tw {
    0%, 100% { opacity: 0.35; transform: scale(0.88); }
    50% { opacity: 1; transform: scale(1.08); }
  }

  @keyframes cm-sway {
    0%, 100% { transform: rotate(-0.7deg) scale(0.997); }
    50% { transform: rotate(0.7deg) scale(1.003); }
  }

  @keyframes cm-glowPulse {
    0%, 100% { opacity: 0.28; }
    50% { opacity: 0.55; }
  }

  @keyframes cm-dim {
    from { opacity: 0; }
    to { opacity: 0.18; }
  }

  @keyframes cm-pop {
    from { opacity: 0; transform: scale(0.72); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes cm-breathe {
    0%, 100% { opacity: 0.38; transform: scale(0.94); }
    50% { opacity: 0.68; transform: scale(1.06); }
  }

  @keyframes cm-flare {
    0%, 100% { opacity: 0.28; transform: scaleX(0.78); }
    50% { opacity: 0.68; transform: scaleX(1.04); }
  }

  @keyframes cm-starBreathe {
    0%, 100% { opacity: 0.92; transform: scale(0.98); }
    50% { opacity: 1; transform: scale(1.045); }
  }

  @keyframes cm-ring {
    0% { opacity: 0; transform: scale(0.62); }
    24% { opacity: 0.62; }
    100% { opacity: 0; transform: scale(1.56); }
  }

  @keyframes cm-ring2 {
    0% { opacity: 0; transform: scale(0.72); }
    20% { opacity: 0.42; }
    100% { opacity: 0; transform: scale(1.82); }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
  }
</style>

